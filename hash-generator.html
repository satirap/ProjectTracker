<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA-256 Hash Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
    }
    h1 { margin-bottom: 30px; color: #333; }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .hash-output {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 6px;
      margin-top: 10px;
      word-break: break-all;
      font-family: monospace;
      font-size: 12px;
      color: #333;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #5568d3; }
    .copy-btn {
      background: #27ae60;
      font-size: 12px;
      padding: 8px;
      margin-top: 8px;
    }
    .copy-btn:hover { background: #229954; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 SHA-256 Hash Generator</h1>

    <div class="form-group">
      <label for="password">Password ที่ต้องการ Hash:</label>
      <input type="text" id="password" placeholder="e.g., admin123">
    </div>

    <button onclick="generateHash()">Generate Hash</button>

    <div class="form-group" id="resultDiv" style="display: none;">
      <label>SHA-256 Hash:</label>
      <div class="hash-output" id="hashOutput"></div>
      <button class="copy-btn" onclick="copyHash()">📋 Copy Hash</button>
    </div>

    <div style="margin-top: 30px; padding: 20px; background: #f0f7ff; border-radius: 6px; font-size: 13px; color: #0066cc;">
      <strong>วิธีใช้:</strong>
      <ol>
        <li>พิมพ์ password ที่ต้องการในช่อง</li>
        <li>คลิก "Generate Hash"</li>
        <li>Copy hash ไปเก็บใน Firestore field <code>passwordHash</code></li>
      </ol>
    </div>
  </div>

  <script>
    async function generateHash() {
      const password = document.getElementById('password').value;
      if (!password) {
        alert('กรุณาพิมพ์ password');
        return;
      }

      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      document.getElementById('hashOutput').textContent = hashHex;
      document.getElementById('resultDiv').style.display = 'block';
    }

    function copyHash() {
      const hash = document.getElementById('hashOutput').textContent;
      navigator.clipboard.writeText(hash);
      alert('✅ Copy hash สำเร็จ!');
    }

    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateHash();
    });
  </script>
</body>
</html>
