>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px\">\n          <sc-for list=\"{{ weekdays }}\" as=\"w\" hint-placeholder-count=\"7\">\n            <div style=\"text-align:center;font-size:11.5px;font-weight:600;color:#9AA6C0;padding:4px 0\">{{ w }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px\">\n          <sc-for list=\"{{ calDays }}\" as=\"d\" hint-placeholder-count=\"35\">\n            <div style=\"min-height:94px;border-radius:12px;border:1px solid {{ d.border }};background:{{ d.bg }};padding:7px 8px;display:flex;flex-direction:column;gap:4px\">\n              <span style=\"font-family:var(--font-mono);font-size:12px;font-weight:600;color:{{ d.numFg }};align-self:flex-start;{{ d.todayStyle }}\">{{ d.num }}<\u002Fspan>\n              <div style=\"display:flex;flex-direction:column;gap:3px;overflow:hidden\">\n                <sc-for list=\"{{ d.items }}\" as=\"it\" hint-placeholder-count=\"0\">\n                  <div onclick=\"{{ it.open }}\" title=\"{{ it.title }}\" style=\"display:flex;align-items:center;gap:5px;padding:2px 6px;border-radius:7px;background:{{ it.bg }};border:1px solid {{ it.bd }};cursor:pointer;overflow:hidden\">\n                    <span class=\"tnico\" style=\"font-size:10px;color:{{ it.dot }};flex:none\">{{ it.iconEl }}<\u002Fspan>\n                    <span style=\"font-size:10.5px;font-weight:600;color:{{ it.fg }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ it.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid #F0F2F8\">\n          <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#6B7895\"><span class=\"tnico\" style=\"font-size:13px;color:#5B6BE0\"><i data-lucide=\"flag\"><\u002Fi><\u002Fspan>กำหนดส่งงวด<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#6B7895\"><span class=\"tnico\" style=\"font-size:13px;color:#9AA6C0\"><i data-lucide=\"bell\"><\u002Fi><\u002Fspan>เตือนกิจกรรม<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== ORGS CMS ===== -->\n    <sc-if value=\"{{ isOrgs }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:tnFade .35s var(--ease-out)\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px\">\n        <div>\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8C98B4;margin-bottom:6px\">หน่วยงาน / ลูกค้า<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-.02em;margin:0;color:#16203A\">จัดการหน่วยงานและโปรเจกต์<\u002Fh1>\n        <\u002Fdiv>\n        <button onclick=\"{{ newOrg }}\" style=\"height:46px;padding:0 20px;border:none;border-radius:13px;background:linear-gradient(135deg,#5B6BE0,#4F93E8);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 12px 24px -10px rgba(79,107,224,.6)\" style-active=\"transform:translateY(1px) scale(.99)\"><span class=\"tnico\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan> เพิ่มหน่วยงาน<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-for list=\"{{ orgsList }}\" as=\"o\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 32px -22px rgba(31,52,99,.4);padding:20px 22px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n              <div style=\"display:flex;align-items:center;gap:14px;min-width:0\">\n                <div style=\"width:44px;height:44px;flex:none;border-radius:13px;background:{{ o.soft }};color:{{ o.strong }};display:flex;align-items:center;justify-content:center;font-size:20px\" class=\"tnico\"><i data-lucide=\"briefcase\"><\u002Fi><\u002Fdiv>\n                <div style=\"min-width:0\">\n                  <div style=\"font-family:var(--font-display);font-weight:700;font-size:17px;color:#16203A\">{{ o.name }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;color:#8C98B4\">{{ o.count }} โปรเจกต์ · {{ o.activeCount }} กำลังดูแล<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;flex:none\">\n                <button onclick=\"{{ o.addProject }}\" style=\"height:38px;padding:0 14px;border:none;border-radius:11px;background:#EEF0FF;color:#5B6BE0;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px\" style-hover=\"background:#E3E6FE\"><span class=\"tnico\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan> โปรเจกต์<\u002Fbutton>\n                <button onclick=\"{{ o.edit }}\" style=\"width:38px;height:38px;border:1px solid #E6EAF4;border-radius:11px;background:#fff;color:#6B7895;cursor:pointer;display:flex;align-items:center;justify-content:center\" class=\"tnico\" style-hover=\"background:#F6F8FD\"><i data-lucide=\"pencil\"><\u002Fi><\u002Fbutton>\n                <button onclick=\"{{ o.del }}\" style=\"width:38px;height:38px;border:1px solid #F5D9E1;border-radius:11px;background:#fff;color:#D6456B;cursor:pointer;display:flex;align-items:center;justify-content:center\" class=\"tnico\" style-hover=\"background:#FCEEF1\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ o.hasProjects }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:16px\">\n              <sc-for list=\"{{ o.projects }}\" as=\"p\" hint-placeholder-count=\"2\">\n                <div onclick=\"{{ p.open }}\" style=\"display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:#FBFCFE;border:1px solid #EEF1F8;cursor:pointer\" style-hover=\"background:#F4F7FD\">\n                  <div style=\"width:8px;height:30px;border-radius:99px;background:{{ p.accentGrad }};flex:none\"><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-weight:600;font-size:13.5px;color:#1B2436;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fdiv>\n                    <div style=\"font-size:11.5px;color:#9AA6C0\">{{ p.badge }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span class=\"tnico\" style=\"color:#C7CFE0;font-size:16px\"><i data-lucide=\"chevron-right\"><\u002Fi><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== COMPANIES CMS ===== -->\n    <sc-if value=\"{{ isCompanies }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:tnFade .35s var(--ease-out)\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px\">\n        <div>\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8C98B4;margin-bottom:6px\">บริษัทของเรา<\u002Fdiv>\n          <h1 style=\"font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-.02em;margin:0;color:#16203A\">จัดการบริษัทที่ดูแล<\u002Fh1>\n          <div style=\"color:#6B7895;font-size:14px;margin-top:6px\">บริษัทคือลำดับบนสุด — แต่ละโปรเจกต์จะอยู่ภายใต้บริษัทใดบริษัทหนึ่ง<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ newCompany }}\" style=\"height:46px;padding:0 20px;border:none;border-radius:13px;background:linear-gradient(135deg,#5B6BE0,#4F93E8);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 12px 24px -10px rgba(79,107,224,.6)\" style-active=\"transform:translateY(1px) scale(.99)\"><span class=\"tnico\"><i data-lucide=\"plus\"><\u002Fi><\u002Fspan> เพิ่มบริษัท<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px\">\n        <sc-for list=\"{{ companiesList }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 32px -22px rgba(31,52,99,.4);overflow:hidden\">\n            <div style=\"height:5px;background:{{ c.grad }}\"><\u002Fdiv>\n            <div style=\"padding:20px 22px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                <div style=\"display:flex;align-items:center;gap:13px;min-width:0\">\n                  <div style=\"width:46px;height:46px;flex:none;border-radius:13px;background:{{ c.soft }};color:{{ c.strong }};display:flex;align-items:center;justify-content:center;font-size:21px\" class=\"tnico\"><i data-lucide=\"building-2\"><\u002Fi><\u002Fdiv>\n                  <div style=\"min-width:0\">\n                    <div style=\"font-family:var(--font-display);font-weight:700;font-size:16.5px;color:#16203A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#8C98B4\">{{ c.count }} โปรเจกต์ · {{ c.activeCount }} กำลังดูแล<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:7px;flex:none\">\n                  <button onclick=\"{{ c.edit }}\" style=\"width:36px;height:36px;border:1px solid #E6EAF4;border-radius:10px;background:#fff;color:#6B7895;cursor:pointer;display:flex;align-items:center;justify-content:center\" class=\"tnico\" style-hover=\"background:#F6F8FD\"><i data-lucide=\"pencil\"><\u002Fi><\u002Fbutton>\n                  <button onclick=\"{{ c.del }}\" style=\"width:36px;height:36px;border:1px solid #F5D9E1;border-radius:10px;background:#fff;color:#D6456B;cursor:pointer;display:flex;align-items:center;justify-content:center\" class=\"tnico\" style-hover=\"background:#FCEEF1\"><i data-lucide=\"trash-2\"><\u002Fi><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ c.view }}\" style=\"width:100%;height:40px;margin-top:16px;border:none;border-radius:11px;background:#EEF0FF;color:#5B6BE0;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px\" style-hover=\"background:#E3E6FE\"><span class=\"tnico\"><i data-lucide=\"folder-open\"><\u002Fi><\u002Fspan> ดูโปรเจกต์ของบริษัทนี้<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== ARCHIVE ===== -->\n    <sc-if value=\"{{ isArchive }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:tnFade .35s var(--ease-out)\">\n      <div style=\"margin-bottom:22px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8C98B4;margin-bottom:6px\">คลังงานเก่า<\u002Fdiv>\n        <h1 style=\"font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-.02em;margin:0;color:#16203A\">โปรเจกต์ที่ปิดงานแล้ว<\u002Fh1>\n        <div style=\"color:#6B7895;font-size:14px;margin-top:6px\">เก็บไว้ดูย้อนหลัง · กู้กลับมาทำต่อได้ทุกเมื่อ<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasArchived }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px\">\n        <sc-for list=\"{{ archivedCards }}\" as=\"p\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 30px -22px rgba(31,52,99,.4);overflow:hidden\">\n            <div style=\"height:5px;background:{{ p.accentGrad }};opacity:.55\"><\u002Fdiv>\n            <div style=\"padding:18px 20px\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n                <div style=\"min-width:0\">\n                  <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9AA6C0\">{{ p.org }}<\u002Fdiv>\n                  <div style=\"font-family:var(--font-display);font-weight:700;font-size:16.5px;color:#41506E;margin-top:3px\">{{ p.name }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:#E6F7EF;color:#117A53;flex:none\"><span class=\"tnico\" style=\"font-size:12px\"><i data-lucide=\"check\"><\u002Fi><\u002Fspan>เสร็จสิ้น<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#8C98B4;margin-top:10px\">{{ p.companyName }} · {{ p.total }} งวด · ปิดงานเมื่อ {{ p.closedStr }}<\u002Fdiv>\n              <div style=\"display:flex;gap:9px;margin-top:15px\">\n                <button onclick=\"{{ p.open }}\" style=\"flex:1;height:38px;border:1px solid #E2E7F2;border-radius:11px;background:#fff;color:#41506E;font-size:13px;font-weight:600;cursor:pointer\" style-hover=\"background:#F6F8FD\">ดูรายละเอียด<\u002Fbutton>\n                <button onclick=\"{{ p.restore }}\" style=\"flex:1;height:38px;border:none;border-radius:11px;background:#EEF0FF;color:#5B6BE0;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px\"><span class=\"tnico\"><i data-lucide=\"rotate-ccw\"><\u002Fi><\u002Fspan>กู้คืน<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noArchived }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#fff;border:1px dashed #D8DEF0;border-radius:20px;padding:50px;text-align:center;color:#9AA6C0;font-size:14.5px\"><div class=\"tnico\" style=\"font-size:34px;margin-bottom:10px;display:flex;justify-content:center\"><i data-lucide=\"archive\"><\u002Fi><\u002Fdiv>ยังไม่มีงานที่ปิดไป<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== EXPORT ===== -->\n    <sc-if value=\"{{ isExport }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:tnFade .35s var(--ease-out)\">\n      <div style=\"margin-bottom:22px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8C98B4;margin-bottom:6px\">ส่งออก / สำรองข้อมูล<\u002Fdiv>\n        <h1 style=\"font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-.02em;margin:0;color:#16203A\">นำข้อมูลออกไปใช้ต่อ<\u002Fh1>\n        <div style=\"color:#6B7895;font-size:14px;margin-top:6px\">ดาวน์โหลดเป็น Excel (CSV รองรับภาษาไทย) หรือสำรองทั้งระบบเป็นไฟล์ JSON · ขอบเขตอิงตามบริษัทที่เลือกอยู่<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start\">\n        <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 32px -22px rgba(31,52,99,.4);padding:22px\">\n          <div style=\"font-size:13px;font-weight:700;color:#41506E;margin-bottom:12px\">เลือกขอบเขตข้อมูล<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ exportScopes }}\" as=\"sc\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ sc.pick }}\" style=\"display:flex;align-items:center;gap:11px;padding:12px 13px;border-radius:13px;cursor:pointer;text-align:left;border:1.5px solid {{ sc.border }};background:{{ sc.bg }}\">\n                <span style=\"width:18px;height:18px;border-radius:99px;border:1.5px solid {{ sc.ringBorder }};background:{{ sc.ringBg }};flex:none;display:flex;align-items:center;justify-content:center\"><span style=\"width:8px;height:8px;border-radius:99px;background:{{ sc.dot }}\"><\u002Fspan><\u002Fspan>\n                <div><div style=\"font-size:13.5px;font-weight:600;color:#1B2436\">{{ sc.label }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9AA6C0\">{{ sc.desc }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ scopeIsProjects }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;border-top:1px solid #F0F2F8;padding-top:14px\">\n            <div style=\"font-size:12px;font-weight:600;color:#8C98B4;margin-bottom:9px\">เลือกโปรเจกต์<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px;max-height:240px;overflow:auto\">\n              <sc-for list=\"{{ exportProjectList }}\" as=\"p\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ p.toggle }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;border:1px solid #EEF1F8;background:{{ p.bg }};cursor:pointer;text-align:left\">\n                  <span style=\"width:18px;height:18px;border-radius:6px;border:1.5px solid {{ p.boxBorder }};background:{{ p.boxBg }};color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px\" class=\"tnico\">{{ p.checkEl }}<\u002Fspan>\n                  <span style=\"font-size:13px;color:#1B2436;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ p.name }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ scopeIsRange }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;border-top:1px solid #F0F2F8;padding-top:14px;display:flex;flex-direction:column;gap:10px\">\n            <div style=\"font-size:12px;font-weight:600;color:#8C98B4\">กรองตามวันส่ง (due date)<\u002Fdiv>\n            <div><label style=\"font-size:11.5px;color:#9AA6C0;display:block;margin-bottom:4px\">ตั้งแต่<\u002Flabel><input type=\"date\" value=\"{{ exportFrom }}\" oninput=\"{{ onExportFrom }}\" style=\"width:100%;height:40px;border-radius:11px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:13px;color:#1B2436;outline:none\"><\u002Fdiv>\n            <div><label style=\"font-size:11.5px;color:#9AA6C0;display:block;margin-bottom:4px\">ถึง<\u002Flabel><input type=\"date\" value=\"{{ exportTo }}\" oninput=\"{{ onExportTo }}\" style=\"width:100%;height:40px;border-radius:11px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:13px;color:#1B2436;outline:none\"><\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <label style=\"display:flex;align-items:center;gap:9px;margin-top:14px;border-top:1px solid #F0F2F8;padding-top:14px;cursor:pointer\">\n            <input type=\"checkbox\" checked=\"{{ includeArchived }}\" onchange=\"{{ onIncludeArchived }}\" style=\"width:17px;height:17px;accent-color:#5B6BE0;cursor:pointer\">\n            <span style=\"font-size:13px;color:#41506E\">รวมงานที่ปิดไปแล้ว (archived)<\u002Fspan>\n          <\u002Flabel>\n\n          <button onclick=\"{{ doExportCsv }}\" style=\"width:100%;height:48px;margin-top:18px;border:none;border-radius:13px;background:linear-gradient(135deg,#34A878,#2E9E97);color:#fff;font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 24px -10px rgba(52,168,120,.6)\" style-active=\"transform:translateY(1px) scale(.99)\"><span class=\"tnico\"><i data-lucide=\"file-spreadsheet\"><\u002Fi><\u002Fspan> ดาวน์โหลด Excel (.csv)<\u002Fbutton>\n          <button onclick=\"{{ doExportJson }}\" style=\"width:100%;height:42px;margin-top:9px;border:1px solid #E2E7F2;border-radius:12px;background:#fff;color:#41506E;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px\" style-hover=\"background:#F6F8FD\"><span class=\"tnico\"><i data-lucide=\"database-backup\"><\u002Fi><\u002Fspan> สำรองทั้งระบบ (.json)<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 32px -22px rgba(31,52,99,.4);overflow:hidden\">\n          <div style=\"padding:16px 20px;border-bottom:1px solid #F0F2F8;display:flex;align-items:center;justify-content:space-between\">\n            <span style=\"font-size:13.5px;font-weight:700;color:#41506E\">ตัวอย่างข้อมูลที่จะส่งออก<\u002Fspan>\n            <span style=\"font-family:var(--font-mono);font-size:12px;color:#5B6BE0;background:#EEF0FF;padding:3px 11px;border-radius:99px;font-weight:600\">{{ exportCount }} แถว<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"overflow:auto;max-height:560px\">\n            <sc-for list=\"{{ exportPreview }}\" as=\"r\" hint-placeholder-count=\"8\">\n                  <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:12.5px\">\n              <thead><tr style=\"background:#FBFCFE\">\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">บริษัท<\u002Fth>\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">หน่วยงาน<\u002Fth>\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">โปรเจกต์<\u002Fth>\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">งวด<\u002Fth>\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">สถานะ<\u002Fth>\n                <th style=\"text-align:left;padding:10px 14px;color:#8C98B4;font-weight:600;white-space:nowrap;border-bottom:1px solid #F0F2F8\">วันส่ง<\u002Fth>\n              <\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-bottom:1px solid #F4F6FB\">\n                    <td style=\"padding:9px 14px;color:#6B7895;white-space:nowrap\">{{ r.company }}<\u002Ftd>\n                    <td style=\"padding:9px 14px;color:#6B7895;white-space:nowrap\">{{ r.org }}<\u002Ftd>\n                    <td style=\"padding:9px 14px;color:#1B2436;white-space:nowrap\">{{ r.project }}<\u002Ftd>\n                    <td style=\"padding:9px 14px;color:#41506E;white-space:nowrap\">{{ r.milestone }}<\u002Ftd>\n                    <td style=\"padding:9px 14px;white-space:nowrap\"><span style=\"font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:{{ r.stBg }};color:{{ r.stFg }}\">{{ r.stLabel }}<\u002Fspan><\u002Ftd>\n                    <td style=\"padding:9px 14px;color:#6B7895;white-space:nowrap;font-family:var(--font-mono);font-size:11.5px\">{{ r.due }}<\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n            <sc-if value=\"{{ exportMore }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"padding:11px 14px;font-size:12px;color:#9AA6C0;text-align:center\">…และอีก {{ exportMoreCount }} แถวในไฟล์<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ===================== MODAL ===================== -->\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(20,28,50,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;animation:tnIn .2s ease\">\n  <div onclick=\"{{ stop }}\" style=\"width:100%;max-width:{{ modalWidth }};background:#fff;border-radius:24px;box-shadow:0 30px 70px -20px rgba(20,28,50,.5);overflow:hidden;animation:tnPop .25s var(--ease-out);max-height:90vh;display:flex;flex-direction:column\">\n    <div style=\"padding:20px 24px;border-bottom:1px solid #F0F2F8;display:flex;align-items:center;justify-content:space-between\">\n      <h3 style=\"font-family:var(--font-display);font-weight:700;font-size:19px;margin:0;color:#16203A\">{{ modalTitle }}<\u002Fh3>\n      <button onclick=\"{{ closeModal }}\" style=\"width:34px;height:34px;border:none;border-radius:10px;background:#F0F2FA;color:#6B7895;cursor:pointer;display:flex;align-items:center;justify-content:center\" class=\"tnico\" style-hover=\"background:#E8EBF6\"><i data-lucide=\"x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:22px 24px;overflow:auto\">\n\n      <!-- PROJECT FORM -->\n      <sc-if value=\"{{ modalIsProject }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">บริษัทที่ดูแล<\u002Flabel>\n          <select value=\"{{ form.companyId }}\" onchange=\"{{ ff.companyId }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14.5px;color:#1B2436;cursor:pointer;outline:none\">\n            <sc-for list=\"{{ companyOptions }}\" as=\"c\" hint-placeholder-count=\"3\"><option value=\"{{ c.id }}\">{{ c.name }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ชื่อโปรเจกต์<\u002Flabel><input value=\"{{ form.name }}\" oninput=\"{{ ff.name }}\" placeholder=\"เช่น ติดตั้งระบบ CCTV อาคาร A\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">หน่วยงาน / ลูกค้า<\u002Flabel>\n          <select value=\"{{ form.orgId }}\" onchange=\"{{ ff.orgId }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14.5px;color:#1B2436;cursor:pointer;outline:none\">\n            <sc-for list=\"{{ orgOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o.id }}\">{{ o.name }}<\u002Foption><\u002Fsc-for>\n            <option value=\"__new\">+ เพิ่มหน่วยงานใหม่…<\u002Foption>\n          <\u002Fselect>\n        <\u002Fdiv>\n        <sc-if value=\"{{ formNewOrg }}\" hint-placeholder-val=\"{{ false }}\">\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ชื่อหน่วยงานใหม่<\u002Flabel><input value=\"{{ form.newOrgName }}\" oninput=\"{{ ff.newOrgName }}\" placeholder=\"ชื่อหน่วยงาน / บริษัทลูกค้า\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #C9D2FF;background:#FAFBFF;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">วันเริ่มโปรเจกต์<\u002Flabel><input type=\"date\" value=\"{{ form.startDate }}\" oninput=\"{{ ff.startDate }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14px;outline:none;color:#1B2436\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">โทนสี<\u002Flabel>\n            <div style=\"display:flex;gap:7px;height:46px;align-items:center\">\n              <sc-for list=\"{{ accentSwatches }}\" as=\"a\" hint-placeholder-count=\"6\"><button onclick=\"{{ a.pick }}\" style=\"width:30px;height:30px;border-radius:9px;background:{{ a.grad }};cursor:pointer;border:2.5px solid {{ a.border }};box-shadow:0 2px 6px -1px rgba(31,52,99,.25)\"><\u002Fbutton><\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- MILESTONE FORM -->\n      <sc-if value=\"{{ modalIsMilestone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ชื่องวดงาน<\u002Flabel><input value=\"{{ form.name }}\" oninput=\"{{ ff.name }}\" placeholder=\"เช่น งวดที่ 2 · ติดตั้งและเดินสาย\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">วันส่ง (due)<\u002Flabel><input type=\"date\" value=\"{{ form.dueDate }}\" oninput=\"{{ ff.dueDate }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14px;outline:none;color:#1B2436\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">วันเตือนครั้งที่ 1<\u002Flabel><input type=\"date\" value=\"{{ form.remindDate }}\" oninput=\"{{ ff.remindDate }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">งวดเงิน (%)<\u002Flabel><input type=\"number\" min=\"0\" max=\"100\" value=\"{{ form.value }}\" oninput=\"{{ ff.value }}\" placeholder=\"0-100\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436;font-family:var(--font-mono)\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">สถานะ<\u002Flabel>\n            <select value=\"{{ form.status }}\" onchange=\"{{ ff.status }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14.5px;color:#1B2436;cursor:pointer;outline:none\">\n              <option value=\"waiting\">รอเริ่ม<\u002Foption><option value=\"in_progress\">กำลังทำ<\u002Foption><option value=\"submitted\">ส่งแล้ว<\u002Foption><option value=\"accepted\">ตรวจรับแล้ว<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ผู้รับผิดชอบ<\u002Flabel><input value=\"{{ form.owner }}\" oninput=\"{{ ff.owner }}\" placeholder=\"ชื่อผู้ดูแลงวดนี้\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">หมายเหตุ<\u002Flabel><textarea value=\"{{ form.note }}\" oninput=\"{{ ff.note }}\" placeholder=\"รายละเอียดเพิ่มเติม\" rows=\"2\" style=\"width:100%;border-radius:13px;border:1.5px solid #E2E7F2;padding:11px 14px;font-size:14px;outline:none;color:#1B2436;resize:vertical;font-family:var(--font-body)\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ACTIVITY REMINDER FORM -->\n      <sc-if value=\"{{ modalIsActivity }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">กิจกรรม<\u002Flabel><input value=\"{{ form.text }}\" oninput=\"{{ ff.text }}\" placeholder=\"ชื่อกิจกรรม\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">กำหนดเสร็จ<\u002Flabel><input type=\"date\" value=\"{{ form.dueDate }}\" oninput=\"{{ ff.dueDate }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14px;outline:none;color:#1B2436\"><\u002Fdiv>\n          <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">วันเตือน<\u002Flabel><input type=\"date\" value=\"{{ form.remindDate }}\" oninput=\"{{ ff.remindDate }}\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 12px;font-size:14px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:9px\">\n          <button onclick=\"{{ activityIcs }}\" style=\"flex:1;height:42px;border:1px solid #E2E7F2;border-radius:12px;background:#fff;color:#41506E;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px\" style-hover=\"background:#F6F8FD\"><span class=\"tnico\"><i data-lucide=\"calendar-plus\"><\u002Fi><\u002Fspan> เพิ่มลงปฏิทิน (.ics)<\u002Fbutton>\n          <button onclick=\"{{ activityGcal }}\" style=\"flex:1;height:42px;border:1px solid #E2E7F2;border-radius:12px;background:#fff;color:#41506E;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px\" style-hover=\"background:#F6F8FD\"><span class=\"tnico\"><i data-lucide=\"calendar\"><\u002Fi><\u002Fspan> Google Calendar<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#9AA6C0;background:#F8F9FD;border-radius:11px;padding:10px 13px;line-height:1.5\">ตั้งวันเตือน/กำหนดเสร็จของกิจกรรมสำคัญ แล้วกดเพิ่มลงปฏิทินเพื่อกันลืม — แจ้งเตือนจะทำงานแม้ปิดเว็บนี้<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ORG FORM -->\n      <sc-if value=\"{{ modalIsOrg }}\" hint-placeholder-val=\"{{ false }}\">\n      <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ชื่อหน่วยงาน / ลูกค้า<\u002Flabel><input value=\"{{ form.name }}\" oninput=\"{{ ff.name }}\" placeholder=\"เช่น บมจ. ตัวอย่าง จำกัด\" autofocus=\"\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- COMPANY FORM -->\n      <sc-if value=\"{{ modalIsCompany }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">ชื่อบริษัท<\u002Flabel><input value=\"{{ form.name }}\" oninput=\"{{ ff.name }}\" placeholder=\"เช่น บริษัท เดอะ โนเบิล จำกัด\" autofocus=\"\" style=\"width:100%;height:46px;border-radius:13px;border:1.5px solid #E2E7F2;padding:0 14px;font-size:14.5px;outline:none;color:#1B2436\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:7px\">โทนสี<\u002Flabel>\n          <div style=\"display:flex;gap:7px;align-items:center\">\n            <sc-for list=\"{{ accentSwatches }}\" as=\"a\" hint-placeholder-count=\"6\"><button onclick=\"{{ a.pick }}\" style=\"width:32px;height:32px;border-radius:9px;background:{{ a.grad }};cursor:pointer;border:2.5px solid {{ a.border }};box-shadow:0 2px 6px -1px rgba(31,52,99,.25)\"><\u002Fbutton><\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CONFIRM -->\n      <sc-if value=\"{{ modalIsConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;gap:14px;align-items:flex-start\">\n        <div style=\"width:44px;height:44px;flex:none;border-radius:13px;background:#FCEEF1;color:#D6456B;display:flex;align-items:center;justify-content:center;font-size:22px\" class=\"tnico\"><i data-lucide=\"triangle-alert\"><\u002Fi><\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#41506E;line-height:1.55;padding-top:4px\">{{ confirmMsg }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <sc-if value=\"{{ showFooter }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"padding:16px 24px;border-top:1px solid #F0F2F8;display:flex;gap:11px;justify-content:flex-end\">\n      <button onclick=\"{{ closeModal }}\" style=\"height:44px;padding:0 20px;border:1px solid #E2E7F2;border-radius:12px;background:#fff;color:#6B7895;font-size:14px;font-weight:600;cursor:pointer\" style-hover=\"background:#F6F8FD\">{{ cancelLabel }}<\u002Fbutton>\n      <button onclick=\"{{ saveModal }}\" style=\"height:44px;padding:0 22px;border:none;border-radius:12px;background:{{ saveBtnBg }};color:#fff;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 10px 22px -10px rgba(79,107,224,.6)\" style-active=\"transform:translateY(1px) scale(.99)\">{{ saveLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- TOAST -->\n<sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#16203A;color:#fff;padding:13px 22px;border-radius:14px;font-size:14px;font-weight:500;box-shadow:0 16px 36px -12px rgba(20,28,50,.6);z-index:200;display:flex;align-items:center;gap:9px;animation:tnFade .25s var(--ease-out)\">\n  <span class=\"tnico\" style=\"color:#7FE3B0;font-size:17px\"><i data-lucide=\"check-circle-2\"><\u002Fi><\u002Fspan>{{ toast }}\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;defaultTimelineMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gantt&quot;,&quot;calendar&quot;],&quot;default&quot;:&quot;gantt&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;weekStartsMonday&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nconst KEY = 'tn_pm_v3';\nconst PW = 'Thenoble2556!';\nconst TH_MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];\nconst TH_MONTHS_FULL = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];\nconst STATUS = {\n  waiting:     {label:'รอเริ่ม',     bg:'#EEF1F6', fg:'#5A6B85', dot:'#94A3B8'},\n  in_progress: {label:'กำลังทำ',     bg:'#E7F1FE', fg:'#1A5FB4', dot:'#3B82F6'},\n  submitted:   {label:'ส่งแล้ว',     bg:'#FFF3E6', fg:'#B5650A', dot:'#F2A33C'},\n  accepted:    {label:'ตรวจรับแล้ว', bg:'#E6F7EF', fg:'#117A53', dot:'#22A06B'},\n};\nconst ACCENTS = [\n  {soft:'#EEF0FF', strong:'#6E7BE6', grad:'linear-gradient(135deg,#7D89F0,#9AA6FF)'},\n  {soft:'#E8F7F0', strong:'#2E9E78', grad:'linear-gradient(135deg,#3EBE92,#74D9B2)'},\n  {soft:'#FFF1E9', strong:'#E0844A', grad:'linear-gradient(135deg,#F59E63,#FFC59B)'},\n  {soft:'#FDEFF4', strong:'#DD6699', grad:'linear-gradient(135deg,#EE82AE,#F8B6D2)'},\n  {soft:'#E9F3FE', strong:'#4F93E8', grad:'linear-gradient(135deg,#5BA0F0,#8FC2F7)'},\n  {soft:'#F3EEFC', strong:'#9B6FD6', grad:'linear-gradient(135deg,#A981E2,#C7AEF0)'},\n];\n\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.state = {\n      data: this.load(),\n      locked: !(typeof sessionStorage!=='undefined' && sessionStorage.getItem('tn_pm_unlocked')==='1'),\n      pwInput: '', pwError: false,\n      view: 'dashboard',\n      companyId: 'all', companyMenuOpen: false,\n      selectedProjectId: null,\n      timelineMode: (props.defaultTimelineMode==='calendar') ? 'calendar' : 'gantt',\n      calMonth: this.startOfMonth(new Date()),\n      modal: null, form: {},\n      exportScope: 'all', exportSel: {}, exportFrom: '', exportTo: '', includeArchived: false,\n      toast: null,\n    };\n  }\n  componentDidMount(){ this.icons(); [60,200,500,1000].forEach(t=>setTimeout(()=>this.icons(),t)); }\n  componentDidUpdate(){ this.icons(); }\n  icons(){ try{ if(window.lucide&&window.lucide.createIcons) window.lucide.createIcons(); }catch(e){} }\n\n  // ---------- persistence ----------\n  load(){\n    try{ const r = localStorage.getItem(KEY); if(r) return this.ensure(JSON.parse(r)); }catch(e){}\n    try{ const old = localStorage.getItem('tn_pm_v2'); if(old){ const d=this.ensure(JSON.parse(old)); this.persist(d); return d; } }catch(e){}\n    return this.seed();\n  }\n  ensure(d){\n    if(!d.companies || !d.companies.length){ const cid=this.uid(); d.companies=[{id:cid, name:'บริษัท เดอะ โนเบิล จำกัด', accent:0}]; }\n    (d.projects||[]).forEach(p=>{ if(!p.companyId) p.companyId=d.companies[0].id;\n      (p.milestones||[]).forEach(m=>{ (m.checklist||[]).forEach(c=>{ if(c.dueDate===undefined)c.dueDate=''; if(c.remindDate===undefined)c.remindDate=''; }); }); });\n    return d;\n  }\n  persist(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){} }\n  mutate(fn){\n    this.setState(s=>{ const d = JSON.parse(JSON.stringify(s.data)); fn(d); this.persist(d); return {data:d}; });\n  }\n  uid(){ return 'id'+Math.random().toString(36).slice(2,9); }\n  flash(msg){ this.setState({toast:msg}); clearTimeout(this._t); this._t = setTimeout(()=>this.setState({toast:null}), 2600); }\n\n  // ---------- date helpers ----------\n  toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  parse(iso){ if(!iso) return null; const p=iso.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }\n  startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }\n  fmtDate(iso){ const d=this.parse(iso); if(!d) return '—'; return d.getDate()+' '+TH_MONTHS[d.getMonth()]+' '+String((d.getFullYear()+543)%100).padStart(2,'0'); }\n  fmtLong(iso){ const d=this.parse(iso); if(!d) return '—'; return d.getDate()+' '+TH_MONTHS_FULL[d.getMonth()]+' '+(d.getFullYear()+543); }\n  today0(){ const d=new Date(); d.setHours(0,0,0,0); return d; }\n  daysLeft(iso){ const d=this.parse(iso); if(!d) return 9999; return Math.round((d.getTime()-this.today0().getTime())/86400000); }\n  urgency(iso){\n    const n=this.daysLeft(iso);\n    if(n<0) return {bg:'#FCE7EC',fg:'#C0344A',dot:'#E0496A',label:'เลย '+(-n)+' วัน'};\n    if(n===0) return {bg:'#FFE9DC',fg:'#C2570D',dot:'#F2792B',label:'วันนี้'};\n    if(n<=2) return {bg:'#FFE9DC',fg:'#C2570D',dot:'#F2792B',label:'อีก '+n+' วัน'};\n    if(n<=7) return {bg:'#FBF3D5',fg:'#94700A',dot:'#E0B43A',label:'อีก '+n+' วัน'};\n    return {bg:'#EAEEF4',fg:'#5A6B85',dot:'#94A3B8',label:'อีก '+n+' วัน'};\n  }\n\n  // ---------- derived ----------\n  companyObj(id){ return this.state.data.companies.find(c=>c.id===id); }\n  companyName(id){ const c=this.companyObj(id); return c?c.name:'—'; }\n  inCompany(p){ const c=this.state.companyId; return (!c||c==='all') ? true : p.companyId===c; }\n  orgName(d,id){ const o=(d||this.state.data).orgs.find(x=>x.id===id); return o?o.name:'—'; }\n  projProgress(p){ return p.milestones.filter(m=>m.status==='accepted').reduce((a,m)=>a+(+m.value||0),0); }\n  currentMs(p){ const open=p.milestones.filter(m=>m.status!=='accepted').sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')); return open[0]||null; }\n  sortedMs(p){ return [...p.milestones].sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||'')); }\n  activeProjects(){ return this.state.data.projects.filter(p=>p.status!=='archived' && this.inCompany(p)); }\n\n  // ---------- nav / view ----------\n  go(v){ this.setState({view:v, selectedProjectId: v==='project'?this.state.selectedProjectId:null}); }\n  openProject(id){ this.setState({view:'project', selectedProjectId:id}); }\n  setCompany(id){ this.setState({companyId:id, companyMenuOpen:false, view:'dashboard', selectedProjectId:null, exportSel:{}}); }\n  lock(){ try{ sessionStorage.removeItem('tn_pm_unlocked'); }catch(e){} this.setState({locked:true, pwInput:''}); }\n  doUnlock(){\n    if(this.state.pwInput===PW){ try{ sessionStorage.setItem('tn_pm_unlocked','1'); }catch(e){} this.setState({locked:false, pwError:false, pwInput:''}); }\n    else this.setState({pwError:true});\n  }\n\n  // ---------- modals ----------\n  openModal(type, mode, payload){\n    let form = {};\n    if(type==='project'){\n      if(mode==='edit'){ const p=payload; form={id:p.id, name:p.name, companyId:p.companyId, orgId:p.orgId, startDate:p.startDate, accent:p.accent, newOrgName:''}; }\n      else { const orgs=this.state.data.orgs; const cs=this.state.data.companies; const defC=(this.state.companyId&&this.state.companyId!=='all')?this.state.companyId:(cs[0]&&cs[0].id);\n        form={name:'', companyId:(payload&&payload.companyId)||defC, orgId:(payload&&payload.orgId)||(orgs[0]&&orgs[0].id)||'__new', startDate:this.toISO(new Date()), accent:Math.floor(Math.random()*ACCENTS.length), newOrgName:''}; }\n    } else if(type==='milestone'){\n      if(mode==='edit'){ const m=payload.m; form={projectId:payload.projectId, id:m.id, name:m.name, dueDate:m.dueDate, remindDate:m.remindDate||'', value:m.value, status:m.status, owner:m.owner||'', note:m.note||''}; }\n      else { form={projectId:payload.projectId, name:'', dueDate:this.toISO(new Date()), remindDate:'', value:0, status:'waiting', owner:'', note:''}; }\n    } else if(type==='activity'){\n      const c=payload.c; form={projectId:payload.projectId, milestoneId:payload.milestoneId, id:c.id, text:c.text, dueDate:c.dueDate||'', remindDate:c.remindDate||''};\n    } else if(type==='org'){\n      form = mode==='edit' ? {id:payload.id, name:payload.name} : {name:''};\n    } else if(type==='company'){\n      form = mode==='edit' ? {id:payload.id, name:payload.name, accent:payload.accent||0} : {name:'', accent:Math.floor(Math.random()*ACCENTS.length)};\n    } else if(type==='confirm'){\n      form = {msg:payload.msg, action:payload.action};\n    }\n    this.setState({modal:{type,mode}, form});\n  }\n  closeModal(){ this.setState({modal:null, form:{}}); }\n  ff(field){ return (e)=>{ const v = e&&e.target?e.target.value:e; this.setState(s=>({form:{...s.form,[field]:v}})); }; }\n  setForm(field,val){ this.setState(s=>({form:{...s.form,[field]:val}})); }\n\n  saveModal(){\n    const {modal, form} = this.state;\n    if(!modal) return;\n    if(modal.type==='confirm'){ const act=form.action; this.closeModal(); if(act) act(); return; }\n    if(modal.type==='project'){\n      if(!form.name || !form.name.trim()){ this.flash('กรุณากรอกชื่อโปรเจกต์'); return; }\n      let orgId = form.orgId;\n      this.mutate(d=>{\n        if(orgId==='__new'){ const nid=this.uid(); d.orgs.push({id:nid, name:(form.newOrgName||'หน่วยงานใหม่').trim()}); orgId=nid; }\n        if(modal.mode==='edit'){ const p=d.projects.find(x=>x.id===form.id); if(p){ p.name=form.name.trim(); p.companyId=form.companyId; p.orgId=orgId; p.startDate=form.startDate; p.accent=form.accent; } }\n        else { d.projects.push({id:this.uid(), name:form.name.trim(), companyId:form.companyId, orgId, startDate:form.startDate, accent:form.accent, status:'active', milestones:[]}); }\n      });\n      this.flash(modal.mode==='edit'?'บันทึกโปรเจกต์แล้ว':'เพิ่มโปรเจกต์แล้ว');\n    } else if(modal.type==='milestone'){\n      if(!form.name || !form.name.trim()){ this.flash('กรุณากรอกชื่องวดงาน'); return; }\n      this.mutate(d=>{\n        const p=d.projects.find(x=>x.id===form.projectId); if(!p) return;\n        if(modal.mode==='edit'){ const m=p.milestones.find(x=>x.id===form.id); if(m){ m.name=form.name.trim(); m.dueDate=form.dueDate; m.remindDate=form.remindDate; m.value=+form.value||0; m.status=form.status; m.owner=form.owner; m.note=form.note; } }\n        else { p.milestones.push({id:this.uid(), name:form.name.trim(), dueDate:form.dueDate, remindDate:form.remindDate, value:+form.value||0, status:form.status, owner:form.owner, note:form.note, checklist:[]}); }\n      });\n      this.flash(modal.mode==='edit'?'บันทึกงวดงานแล้ว':'เพิ่มงวดงานแล้ว');\n    } else if(modal.type==='activity'){\n      this.mutate(d=>{ const p=d.projects.find(x=>x.id===form.projectId); const m=p&&p.milestones.find(x=>x.id===form.milestoneId); const c=m&&m.checklist.find(x=>x.id===form.id);\n        if(c){ if(form.text&&form.text.trim()) c.text=form.text.trim(); c.dueDate=form.dueDate||''; c.remindDate=form.remindDate||''; } });\n      this.flash('บันทึกการเตือนกิจกรรมแล้ว');\n    } else if(modal.type==='org'){\n      if(!form.name || !form.name.trim()){ this.flash('กรุณากรอกชื่อหน่วยงาน'); return; }\n      this.mutate(d=>{\n        if(modal.mode==='edit'){ const o=d.orgs.find(x=>x.id===form.id); if(o) o.name=form.name.trim(); }\n        else d.orgs.push({id:this.uid(), name:form.name.trim()});\n      });\n      this.flash(modal.mode==='edit'?'บันทึกหน่วยงานแล้ว':'เพิ่มหน่วยงานแล้ว');\n    } else if(modal.type==='company'){\n      if(!form.name || !form.name.trim()){ this.flash('กรุณากรอกชื่อบริษัท'); return; }\n      this.mutate(d=>{\n        if(modal.mode==='edit'){ const c=d.companies.find(x=>x.id===form.id); if(c){ c.name=form.name.trim(); c.accent=form.accent; } }\n        else d.companies.push({id:this.uid(), name:form.name.trim(), accent:form.accent});\n      });\n      this.flash(modal.mode==='edit'?'บันทึกบริษัทแล้ว':'เพิ่มบริษัทแล้ว');\n    }\n    this.closeModal();\n  }\n\n  // ---------- mutations ----------\n  archiveProject(id){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===id); if(p){ p.status='archived'; p.closedAt=this.toISO(new Date()); } }); this.setState({view:'dashboard',selectedProjectId:null}); this.flash('ปิดงานและย้ายเข้าคลังแล้ว'); }\n  restoreProject(id){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===id); if(p){ p.status='active'; delete p.closedAt; } }); this.flash('กู้คืนโปรเจกต์แล้ว'); }\n  deleteProject(id){ this.mutate(d=>{ d.projects=d.projects.filter(x=>x.id!==id); }); this.setState({view:'dashboard',selectedProjectId:null}); this.flash('ลบโปรเจกต์แล้ว'); }\n  deleteOrg(id){ this.mutate(d=>{ d.orgs=d.orgs.filter(x=>x.id!==id); d.projects=d.projects.filter(p=>p.orgId!==id); }); this.flash('ลบหน่วยงานแล้ว'); }\n  deleteCompany(id){ this.mutate(d=>{ d.companies=d.companies.filter(x=>x.id!==id); d.projects=d.projects.filter(p=>p.companyId!==id); }); this.setState(s=>({companyId:s.companyId===id?'all':s.companyId})); this.flash('ลบบริษัทแล้ว'); }\n  deleteMilestone(pid,mid){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===pid); if(p) p.milestones=p.milestones.filter(m=>m.id!==mid); }); this.flash('ลบงวดงานแล้ว'); }\n  setStatus(pid,mid,st){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===pid); if(p){ const m=p.milestones.find(x=>x.id===mid); if(m) m.status=st; } }); }\n  toggleCheck(pid,mid,cid){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===pid); const m=p&&p.milestones.find(x=>x.id===mid); const c=m&&m.checklist.find(x=>x.id===cid); if(c) c.done=!c.done; }); }\n  delCheck(pid,mid,cid){ this.mutate(d=>{ const p=d.projects.find(x=>x.id===pid); const m=p&&p.milestones.find(x=>x.id===mid); if(m) m.checklist=m.checklist.filter(x=>x.id!==cid); }); }\n  addCheck(pid,mid){\n    const txt=(this.state.draft&&this.state.draft[mid]||'').trim(); if(!txt) return;\n    this.mutate(d=>{ const p=d.projects.find(x=>x.id===pid); const m=p&&p.milestones.find(x=>x.id===mid); if(m) m.checklist.push({id:this.uid(),text:txt,done:false,dueDate:'',remindDate:''}); });\n    this.setState(s=>({draft:{...(s.draft||{}),[mid]:''}}));\n  }\n  setDraft(mid,v){ this.setState(s=>({draft:{...(s.draft||{}),[mid]:v}})); }\n\n  // ---------- calendar ----------\n  calShift(n){ this.setState(s=>({calMonth:new Date(s.calMonth.getFullYear(), s.calMonth.getMonth()+n, 1)})); }\n\n  // ---------- reminders ----------\n  download(filename, text, mime){\n    const blob=new Blob([text],{type:mime}); const url=URL.createObjectURL(blob);\n    const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();\n    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },100);\n  }\n  pad(n){ return String(n).padStart(2,'0'); }\n  icsStamp(iso,h,m){ const d=this.parse(iso); if(!d) return ''; return d.getFullYear()+this.pad(d.getMonth()+1)+this.pad(d.getDate())+'T'+this.pad(h||9)+this.pad(m||0)+'00'; }\n  utcStamp(){ const now=new Date(); return now.getUTCFullYear()+this.pad(now.getUTCMonth()+1)+this.pad(now.getUTCDate())+'T'+this.pad(now.getUTCHours())+this.pad(now.getUTCMinutes())+this.pad(now.getUTCSeconds())+'Z'; }\n  buildIcs(uid, dateIso, title, desc, remindIso){\n    const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//The Noble//PM Tracker//TH','CALSCALE:GREGORIAN','BEGIN:VEVENT','UID:'+uid+'@thenoble.pm','DTSTAMP:'+this.utcStamp(),'DTSTART:'+this.icsStamp(dateIso,9,0),'DTEND:'+this.icsStamp(dateIso,10,0),'SUMMARY:'+title,'DESCRIPTION:'+desc];\n    if(remindIso){ lines.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:เตือนล่วงหน้า: '+title,'TRIGGER;VALUE=DATE-TIME:'+this.icsStamp(remindIso,9,0),'END:VALARM'); }\n    lines.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:ครบกำหนด: '+title,'TRIGGER:-PT1H','END:VALARM','END:VEVENT','END:VCALENDAR');\n    return lines.join('\\r\\n');\n  }\n  safeName(s){ return (s||'event').replace(/[^\\u0E00-\\u0E7Fa-zA-Z0-9]+/g,'_'); }\n  makeIcs(p,m){\n    const desc='หน่วยงาน '+this.orgName(null,p.orgId)+' \\\\nงวดเงิน '+(m.value||0)+'%'+(m.owner?(' \\\\nผู้รับผิดชอบ '+m.owner):'');\n    const ics=this.buildIcs(m.id, m.dueDate, '[ส่งงาน] '+p.name+' · '+m.name, desc, m.remindDate);\n    this.download(this.safeName(m.name)+'.ics', ics, 'text/calendar');\n    this.flash('ดาวน์โหลดไฟล์ปฏิทินแล้ว — เปิดเพื่อเพิ่มลงปฏิทิน');\n  }\n  gcalUrl(title, dateIso, desc){\n    const d=this.parse(dateIso); if(!d) return null;\n    const nd=new Date(d); nd.setDate(nd.getDate()+1);\n    const f=x=>x.getFullYear()+this.pad(x.getMonth()+1)+this.pad(x.getDate());\n    return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&dates='+f(d)+'/'+f(nd)+'&details='+encodeURIComponent(desc);\n  }\n  gcal(p,m){\n    const url=this.gcalUrl('[ส่งงาน] '+p.name+' · '+m.name, m.dueDate, 'หน่วยงาน '+this.orgName(null,p.orgId)+'\\nงวดเงิน '+(m.value||0)+'%'+(m.owner?('\\nผู้รับผิดชอบ '+m.owner):''));\n    if(url) window.open(url,'_blank');\n  }\n  activityIcs(){\n    const f=this.state.form; const p=this.state.data.projects.find(x=>x.id===f.projectId); if(!p) return;\n    const date=f.dueDate||f.remindDate; if(!date){ this.flash('กรุณาระบุวันก่อนเพิ่มลงปฏิทิน'); return; }\n    const ics=this.buildIcs(f.id, date, '[กิจกรรม] '+p.name+' · '+f.text, 'กิจกรรมในงวดงาน', (f.dueDate&&f.remindDate)?f.remindDate:'');\n    this.download(this.safeName(f.text)+'.ics', ics, 'text/calendar');\n    this.flash('ดาวน์โหลดไฟล์ปฏิทินของกิจกรรมแล้ว');\n  }\n  activityGcal(){\n    const f=this.state.form; const p=this.state.data.projects.find(x=>x.id===f.projectId); if(!p) return;\n    const date=f.dueDate||f.remindDate; if(!date){ this.flash('กรุณาระบุวันก่อน'); return; }\n    const url=this.gcalUrl('[กิจกรรม] '+p.name+' · '+f.text, date, 'กิจกรรมในงวดงาน'); if(url) window.open(url,'_blank');\n  }\n\n  // ---------- export ----------\n  exportRows(){\n    const d=this.state.data;\n    let projects=d.projects.filter(p=> (this.state.includeArchived ? true : p.status!=='archived') && this.inCompany(p));\n    if(this.state.exportScope==='projects'){ const sel=this.state.exportSel; projects=projects.filter(p=>sel[p.id]); }\n    const rows=[];\n    projects.forEach(p=>{\n      this.sortedMs(p).forEach((m,i)=>{\n        if(this.state.exportScope==='range'){\n          const from=this.state.exportFrom, to=this.state.exportTo;\n          if(from && (m.dueDate||'')<from) return;\n          if(to && (m.dueDate||'')>to) return;\n        }\n        const done=m.checklist.filter(c=>c.done).length;\n        rows.push({\n          company:this.companyName(p.companyId), org:this.orgName(null,p.orgId), project:p.name, projStatus:p.status==='archived'?'ปิดงานแล้ว':'กำลังดูแล',\n          no:i+1, milestone:m.name, status:(STATUS[m.status]||{}).label||m.status,\n          due:this.fmtDate(m.dueDate), remind:m.remindDate?this.fmtDate(m.remindDate):'', value:m.value||0,\n          owner:m.owner||'', checklist:done+'/'+m.checklist.length, note:m.note||''\n        });\n      });\n    });\n    return rows;\n  }\n  csvCell(v){ v=(v==null?'':String(v)); return /[\",\\n]/.test(v) ? '\"'+v.replace(/\"/g,'\"\"')+'\"' : v; }\n  doExportCsv(){\n    const rows=this.exportRows();\n    if(!rows.length){ this.flash('ไม่มีข้อมูลตามเงื่อนไขที่เลือก'); return; }\n    const head=['บริษัท','หน่วยงาน','โปรเจกต์','สถานะโปรเจกต์','งวดที่','ชื่องวด','สถานะงวด','วันส่ง','วันเตือน','งวดเงิน(%)','ผู้รับผิดชอบ','checklist','หมายเหตุ'];\n    const lines=[head.map(h=>this.csvCell(h)).join(',')];\n    rows.forEach(r=>lines.push([r.company,r.org,r.project,r.projStatus,r.no,r.milestone,r.status,r.due,r.remind,r.value,r.owner,r.checklist,r.note].map(c=>this.csvCell(c)).join(',')));\n    this.download('thenoble-pm-'+this.toISO(new Date())+'.csv', '\\uFEFF'+lines.join('\\r\\n'), 'text/csv;charset=utf-8');\n    this.flash('ส่งออก '+rows.length+' แถวเป็นไฟล์ Excel แล้ว');\n  }\n  doExportJson(){ this.download('thenoble-pm-backup-'+this.toISO(new Date())+'.json', JSON.stringify(this.state.data,null,2), 'application/json'); this.flash('สำรองข้อมูล
