document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n  font-family: 'IBM Plex Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d6497806-a8ba-48de-b21c-a3d258a385ae\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* thai */\n@font-face {\n  font-family: 'IBM Plex Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"0aca6ca5-8fb5-4958-87d5-6627ef4b1487\") format('woff2');\n  unicode-range: U+02D7, U+0303, U+0331, U+0E01-0E5B, U+200C-200D, U+25CC;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ad6a8127-d0ca-4672-b3d5-e099e8470ae7\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans Thai';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"da9e4737-d07a-48d8-a994-a904eb235c4e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* The Noble — Color tokens\n   Brand: royal blue + signal red drawn from the master logo.\n   Cool slate neutrals give the system a precise, technical feel. */\n\n:root {\n  /* ---- Brand: Blue (primary) ---- */\n  --blue-950: #04244a;\n  --blue-900: #062f5e;\n  --blue-800: #073c78;\n  --blue-700: #0a51a1; /* THE NOBLE blue — canonical */\n  --blue-600: #0f5fbb;\n  --blue-500: #1a72d6;\n  --blue-400: #4690e6;\n  --blue-300: #84b5ef;\n  --blue-200: #bcd6f7;\n  --blue-100: #dcebfb;\n  --blue-50:  #eef5fe;\n\n  /* ---- Brand: Red (signal / accent) ---- */\n  --red-800: #9e1117;\n  --red-700: #c8161d;\n  --red-600: #ed1c24; /* THE NOBLE red — canonical */\n  --red-500: #f3434a;\n  --red-300: #f89a9e;\n  --red-100: #fbe0e1;\n  --red-50:  #fdf0f1;\n\n  /* ---- Neutrals: cool slate ---- */\n  --ink-900: #0b1220;\n  --ink-800: #141d2e;\n  --ink-700: #283449;\n  --ink-600: #45546e;\n  --ink-500: #64748b;\n  --ink-400: #8b99ad;\n  --ink-300: #b6c1d1;\n  --ink-200: #d8e0ea;\n  --ink-150: #e6ecf3;\n  --ink-100: #eff3f8;\n  --ink-50:  #f6f9fc;\n  --white:   #ffffff;\n\n  /* ---- Status ---- */\n  --success-600: #15935b;\n  --success-100: #d8f1e4;\n  --warning-600: #c9820a;\n  --warning-100: #fbeed0;\n  --danger-600:  #d22d2d;\n  --danger-100:  #fbe0e0;\n  --info-600:    #0f5fbb;\n  --info-100:    #dcebfb;\n\n  /* ================= Semantic aliases ================= */\n  --primary:        var(--blue-700);\n  --primary-hover:  var(--blue-800);\n  --primary-active: var(--blue-900);\n  --primary-soft:   var(--blue-50);\n  --primary-on:     var(--white);\n\n  --accent:         var(--red-600);\n  --accent-hover:   var(--red-700);\n  --accent-active:  var(--red-800);\n  --accent-soft:    var(--red-50);\n  --accent-on:      var(--white);\n\n  --text-strong:  var(--ink-900);\n  --text-body:    var(--ink-700);\n  --text-muted:   var(--ink-500);\n  --text-faint:   var(--ink-400);\n  --text-on-brand: var(--white);\n  --text-link:    var(--blue-700);\n\n  --surface-page:    var(--ink-50);\n  --surface-card:    var(--white);\n  --surface-sunken:  var(--ink-100);\n  --surface-inverse: var(--ink-900);\n  --surface-brand:   var(--blue-700);\n\n  --border-subtle:  var(--ink-150);\n  --border-default: var(--ink-200);\n  --border-strong:  var(--ink-300);\n  --border-focus:   var(--blue-500);\n\n  /* Signature gradient — \"Glow together\" */\n  --gradient-brand: linear-gradient(135deg, #0a51a1 0%, #1a72d6 100%); /* @kind color */\n  --gradient-glow:  radial-gradient(60% 80% at 50% 0%, rgba(26,114,214,0.20) 0%, rgba(26,114,214,0) 70%); /* @kind color */\n  --gradient-signal: linear-gradient(135deg, #ed1c24 0%, #f3434a 100%); /* @kind color */\n}\n<\u002Fstyle>\n<style>/* The Noble — Typography tokens */\n\n:root {\n  /* Families */\n  --font-display: \"Anuphan\", \"IBM Plex Sans Thai\", system-ui, sans-serif;\n  --font-body:    \"IBM Plex Sans Thai\", \"Anuphan\", system-ui, sans-serif;\n  --font-mono:    \"IBM Plex Mono\", ui-monospace, \"SFMono-Regular\", monospace;\n\n  /* Weights */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* Type scale (rem, 16px base). Display tokens are the desktop sizes;\n     scale down per-breakpoint in layout CSS where needed. */\n  --text-display-2xl: 4.5rem;   /* 72 — hero */\n  --text-display-xl:  3.5rem;   /* 56 */\n  --text-display-lg:  2.75rem;  /* 44 */\n  --text-h1: 2.25rem;   /* 36 */\n  --text-h2: 1.75rem;   /* 28 */\n  --text-h3: 1.375rem;  /* 22 */\n  --text-h4: 1.125rem;  /* 18 */\n  --text-lg:   1.125rem; /* 18 */\n  --text-base: 1rem;     /* 16 */\n  --text-sm:   0.875rem; /* 14 */\n  --text-xs:   0.75rem;  /* 12 */\n  --text-2xs:  0.6875rem;/* 11 — labels/eyebrows */\n\n  /* Line heights */\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.65;\n\n  /* Letter spacing */\n  --tracking-tight:  -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.04em;\n  --tracking-eyebrow: 0.14em; /* uppercase eyebrows / labels */\n}\n<\u002Fstyle>\n<style>/* The Noble — Spacing, radii, layout tokens.\n   8px base grid with a 4px half-step. */\n\n:root {\n  --space-0:  0;\n  --space-1:  0.25rem;  /* 4  */\n  --space-2:  0.5rem;   /* 8  */\n  --space-3:  0.75rem;  /* 12 */\n  --space-4:  1rem;     /* 16 */\n  --space-5:  1.5rem;   /* 24 */\n  --space-6:  2rem;     /* 32 */\n  --space-7:  2.5rem;   /* 40 */\n  --space-8:  3rem;     /* 48 */\n  --space-9:  4rem;     /* 64 */\n  --space-10: 5rem;     /* 80 */\n  --space-12: 6rem;     /* 96 */\n  --space-16: 8rem;     /* 128 */\n\n  /* Radii — confident, modern rounding */\n  --radius-xs:  4px;\n  --radius-sm:  8px;\n  --radius-md:  12px;\n  --radius-lg:  16px;\n  --radius-xl:  24px;\n  --radius-2xl: 32px;\n  --radius-pill: 999px;\n\n  /* Layout */\n  --container-max: 1200px;\n  --container-wide: 1320px;\n  --container-pad: clamp(1rem, 4vw, 2.5rem);\n  --section-gap: clamp(4rem, 8vw, 7.5rem);\n\n  /* Control sizing */\n  --control-h-sm: 36px;\n  --control-h-md: 44px;\n  --control-h-lg: 52px;\n}\n<\u002Fstyle>\n<style>/* The Noble — Effects: shadows, rings, transitions.\n   Shadows are cool-tinted (blue-slate) to sit on light surfaces without\n   muddying. Keep them soft and layered, never heavy. */\n\n:root {\n  /* Elevation — cool slate shadow */\n  --shadow-xs: 0 1px 2px rgba(11, 18, 32, 0.06);\n  --shadow-sm: 0 1px 3px rgba(11, 18, 32, 0.08), 0 1px 2px rgba(11, 18, 32, 0.05);\n  --shadow-md: 0 4px 12px rgba(13, 38, 76, 0.08), 0 2px 4px rgba(13, 38, 76, 0.06);\n  --shadow-lg: 0 12px 28px rgba(13, 38, 76, 0.12), 0 4px 10px rgba(13, 38, 76, 0.07);\n  --shadow-xl: 0 24px 56px rgba(13, 38, 76, 0.16), 0 8px 18px rgba(13, 38, 76, 0.08);\n\n  /* Brand glow — used sparingly on primary CTAs / hero accents */\n  --shadow-glow-blue: 0 8px 24px rgba(10, 81, 161, 0.28);\n  --shadow-glow-red:  0 8px 24px rgba(237, 28, 36, 0.26);\n\n  /* Focus ring */\n  --ring-focus: 0 0 0 3px rgba(26, 114, 214, 0.35);\n  --ring-danger: 0 0 0 3px rgba(237, 28, 36, 0.30);\n\n  /* Hairline inset border (for cards on white) */\n  --ring-hairline: inset 0 0 0 1px rgba(20, 29, 46, 0.06); /* @kind shadow */\n\n  /* Motion — quick, precise, no bounce */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 200ms; /* @kind other */\n  --duration-slow: 320ms; /* @kind other */\n  --transition-base: all var(--duration-base) var(--ease-out);\n\n  /* Backdrop blur (glass headers / overlays) */\n  --blur-glass: saturate(160%) blur(14px); /* @kind other */\n}\n<\u002Fstyle>\n<script src=\"7f30c541-bec5-4160-b121-efcf25eb5e16\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{background:#F4F6FD}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#D6DCEC;border-radius:99px;border:2px solid transparent;background-clip:content-box}\n  ::-webkit-scrollbar-thumb:hover{background:#BFC8E0;background-clip:content-box}\n  input,select,textarea,button{font-family:inherit}\n  @keyframes tnFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes tnPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}\n  @keyframes tnIn{from{opacity:0}to{opacity:1}}\n  .tnico svg{width:1em;height:1em;display:block}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;font-family:var(--font-body);color:#1B2436;background:radial-gradient(110% 80% at 100% -10%,#E9EEFF 0%,rgba(233,238,255,0) 55%),radial-gradient(90% 70% at 0% 110%,#FBEFF7 0%,rgba(251,239,247,0) 50%),#F4F6FD;-webkit-font-smoothing:antialiased\">\n\n<!-- ===================== LOGIN GATE ===================== -->\n<sc-if value=\"{{ locked }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px\">\n    <div style=\"width:100%;max-width:420px;animation:tnFade .5s var(--ease-out)\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:18px;margin-bottom:26px\">\n        <div style=\"width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#6E7BE6,#4F93E8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;box-shadow:0 12px 28px -8px rgba(79,147,232,.6)\" class=\"tnico\"><i data-lucide=\"lock-keyhole\"><\u002Fi><\u002Fdiv>\n        <div style=\"text-align:center\">\n          <div style=\"font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-.02em;color:#16203A\">The Noble · PM<\u002Fdiv>\n          <div style=\"color:#6B7895;font-size:14px;margin-top:4px\">ระบบติดตามงานเป็นงวดของทีม<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,.86);backdrop-filter:saturate(160%) blur(14px);border:1px solid #E7EBF6;border-radius:24px;box-shadow:0 20px 50px -18px rgba(31,52,99,.28);padding:28px\">\n        <label style=\"display:block;font-size:13px;font-weight:600;color:#41506E;margin-bottom:8px\">รหัสผ่านเข้าระบบ<\u002Flabel>\n        <div style=\"position:relative\">\n          <span style=\"position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9AA6C0;font-size:18px\" class=\"tnico\"><i data-lucide=\"key-round\"><\u002Fi><\u002Fspan>\n          <input type=\"password\" value=\"{{ pwInput }}\" oninput=\"{{ onPw }}\" onkeydown=\"{{ onPwKey }}\" placeholder=\"กรอกรหัสผ่าน\" autofocus=\"\" style=\"width:100%;height:50px;border-radius:14px;border:1.5px solid #E2E7F2;background:#fff;padding:0 16px 0 42px;font-size:15px;outline:none;color:#1B2436\">\n        <\u002Fdiv>\n        <sc-if value=\"{{ pwError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:center;gap:6px;color:#D6456B;font-size:13px;margin-top:10px\"><span class=\"tnico\" style=\"font-size:15px\"><i data-lucide=\"circle-alert\"><\u002Fi><\u002Fspan>รหัสผ่านไม่ถูกต้อง ลองอีกครั้ง<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ doUnlock }}\" style=\"width:100%;height:50px;margin-top:18px;border:none;border-radius:14px;background:linear-gradient(135deg,#5B6BE0,#4F93E8);color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 12px 26px -10px rgba(79,107,224,.7);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s var(--ease-out)\" style-active=\"transform:translateY(1px) scale(.99)\">เข้าสู่ระบบ <span class=\"tnico\"><i data-lucide=\"arrow-right\"><\u002Fi><\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"text-align:center;color:#9AA6C0;font-size:12px;margin-top:18px\">ข้อมูลถูกเก็บไว้ในเครื่องนี้เท่านั้น · ปลอดภัย ไม่ต้องต่อเซิร์ฟเวอร์<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===================== APP ===================== -->\n<sc-if value=\"{{ unlocked }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;min-height:100vh\">\n\n  <!-- SIDEBAR -->\n  <aside style=\"width:264px;flex:none;position:sticky;top:0;height:100vh;padding:20px 16px;display:flex;flex-direction:column;gap:6px;background:rgba(255,255,255,.7);backdrop-filter:saturate(160%) blur(14px);border-right:1px solid #E8ECF7\">\n    <div style=\"display:flex;align-items:center;gap:10px;padding:4px 6px 12px\">\n      <div style=\"width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,#6E7BE6,#4F93E8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;box-shadow:0 8px 18px -6px rgba(79,147,232,.6)\" class=\"tnico\"><i data-lucide=\"orbit\"><\u002Fi><\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--font-display);font-weight:700;font-size:15.5px;letter-spacing:-.02em;color:#16203A;line-height:1.1\">The Noble<\u002Fdiv>\n        <div style=\"font-size:10px;color:#8C98B4;font-weight:600;letter-spacing:.12em;text-transform:uppercase\">PM Tracker<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- COMPANY SWITCHER (top of hierarchy) -->\n    <div style=\"position:relative;margin:0 2px 12px\">\n      <div style=\"font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9AA6C0;margin:0 4px 6px\">บริษัทที่ดูแล<\u002Fdiv>\n      <button onclick=\"{{ toggleCompanyMenu }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;border:1.5px solid #E4E9F5;border-radius:14px;background:#fff;padding:10px 12px;cursor:pointer;box-shadow:0 6px 16px -10px rgba(31,52,99,.35);text-align:left\" style-hover=\"border-color:#C9D2FF iv style=\"font-family:var(--font-mono);font-weight:600;font-size:34px;color:{{ s.numFg }};margin-top:10px;line-height:1\">{{ s.value }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:{{ s.subFg }};margin-top:4px\">{{ s.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start\">\n        <!-- NEAR DUE -->\n        <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:22px;box-shadow:0 14px 36px -20px rgba(31,52,99,.4);padding:22px\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px\">\n            <span class=\"tnico\" style=\"font-size:19px;color:#E0844A\"><i data-lucide=\"alarm-clock\"><\u002Fi><\u002Fspan>\n            <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;margin:0;color:#16203A\">ใกล้ครบกำหนด<\u002Fh2>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasDeadlines }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ deadlines }}\" as=\"d\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ d.open }}\" style=\"display:flex;align-items:center;gap:13px;padding:12px 13px;border-radius:15px;background:#FBFCFE;border:1px solid #EEF1F8;cursor:pointer;transition:background .15s var(--ease-out)\" style-hover=\"background:#F4F7FD\">\n                  <div style=\"width:9px;height:40px;border-radius:99px;background:{{ d.accent }};flex:none\"><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"display:flex;align-items:center;gap:6px\"><span style=\"font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:1px 7px;border-radius:99px;background:{{ d.tagBg }};color:{{ d.tagFg }}\">{{ d.tag }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-weight:600;font-size:14px;color:#1B2436;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px\">{{ d.milestone }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#8C98B4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px\">{{ d.project }} · {{ d.org }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"text-align:right;flex:none\">\n                    <div style=\"display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:99px;background:{{ d.urBg }};color:{{ d.urFg }}\"><span style=\"width:6px;height:6px;border-radius:99px;background:{{ d.urDot }}\"><\u002Fspan>{{ d.urLabel }}<\u002Fdiv>\n                    <div style=\"font-family:var(--font-mono);font-size:11.5px;color:#9AA6C0;margin-top:4px\">{{ d.dueStr }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noDeadlines }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;padding:30px 0;color:#9AA6C0;font-size:14px\">ไม่มีงานใกล้ครบกำหนด<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- PROJECT CARDS -->\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <span class=\"tnico\" style=\"font-size:19px;color:#5B6BE0\"><i data-lucide=\"folder-kanban\"><\u002Fi><\u002Fspan>\n            <h2 style=\"font-family:var(--font-display);font-weight:700;font-size:18px;margin:0;color:#16203A\">โปรเจกต์ที่กำลังดูแล<\u002Fh2>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasProjectCards }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-for list=\"{{ projectCards }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ p.open }}\" style=\"background:#fff;border:1px solid #EAEEF7;border-radius:20px;box-shadow:0 12px 30px -20px rgba(31,52,99,.4);padding:0;overflow:hidden;cursor:pointer;transition:transform .15s var(--ease-out),box-shadow .15s var(--ease-out)\" style-hover=\"transform:translateY(-3px);box-shadow:0 20px 40px -20px rgba(31,52,99,.5)\">\n              <div style=\"height:5px;background:{{ p.accentGrad }}\"><\u002Fdiv>\n              <div style=\"padding:16px 18px\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n                  <div style=\"min-width:0\">\n                    <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9AA6C0\">{{ p.org }}<\u002Fdiv>\n                    <div style=\"font-family:var(--font-display);font-weight:700;font-size:16.5px;color:#16203A;margin-top:3px;letter-spacing:-.01em\">{{ p.name }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-family:var(--font-mono);font-size:11.5px;font-weight:600;color:#6B7895;background:#F0F2FA;padding:3px 9px;border-radius:99px;flex:none\">งวด {{ p.curIndex }}/{{ p.total }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px\">\n                  <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:99px;background:{{ p.curUrBg }};color:{{ p.curUrFg }}\"><span class=\"tnico\" style=\"font-size:13px\"><i data-lucide=\"flag\"><\u002Fi><\u002Fspan>{{ p.curName }}<\u002Fspan>\n                  <span style=\"font-family:var(--font-mono);font-size:11.5px;color:{{ p.curUrFg }}\">{{ p.curDue }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"margin-top:14px\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:11.5px;color:#8C98B4;margin-bottom:5px\"><span>มูลค่างานที่ตรวจรับแล้ว<\u002Fspan><span style=\"font-family:var(--font-mono);font-weight:600;color:#41506E\">{{ p.progress }}%<\u002Fspan><\u002Fdiv>\n                  <div style=\"height:8px;border-radius:99px;background:#EEF1F8;overflow:hidden\"><div style=\"height:100%;border-radius:99px;background:{{ p.accentGrad }};width:{{ p.progressW }}\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noProjectCards }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border:1px dashed #D8DEF0;border-radius:20px;padding:36px;text-align:center;color:#9AA6C0;font-size:14px\">ยังไม่มีโปรเจกต์ในบริษัทนี้ — กดปุ่ม “โปรเจกต์ใหม่” เพื่อเริ่ม<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== PROJECT DETAIL ===== -->\n    <sc-if value=\"{{ isProject }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:tnFade .35s var(--ease-out)\">\n      <button onclick=\"{{ backToDash }}\" style=\"display:inline-flex;align-items:center;gap:7px;border:none;background:transparent;color:#6B7895;font-size:13.5px;font-weight:600;cursor:pointer;padding:6px 0;margin-bottom:14px\"><span class=\"tnico\"><i data-lucide=\"arrow-left\"><\u002Fi><\u002Fspan> กลับภาพรวม<\u002Fbutton>\n      <div style=\"background:#fff;border:1px solid #EAEEF7;border-radius:24px;box-shadow:0 16px 40px -22px rgba(31,52,99,.45);overflow:hidden;margin-bottom:22px\">\n        <div style=\"height:6px;background:{{ pd.accentGrad }}\"><\u002Fdiv>\n        <div style=\"padding:24px 26px;display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap\">\n          <div style=\"min-width:0\">\n            <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.04em;color:{{ pd.compStrong }};background:{{ pd.compSoft }};padding:2px 9p -if value=\"{{ gantt.showToday }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;top:-4px;bottom:0;left:calc(200px + {{ gantt.todayLeft }} * (100% - 200px) / 100);width:2px;background:#E0496A;z-index:5;border-radius:2px\"><\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;flex-direction:column;gap:11px\">\n            <sc-for list=\"{{ gantt.rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:0\">\n                <div onclick=\"{{ r.open }}\" style=\"width:200px;flex:none;padding-right:16px;cursor:pointer\">\n                  <div style=\"font-weight:600;font-size:13.5px;color:#1B2436;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.name }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#9AA6C0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ r.org }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;position:relative;height:34px;background:#F6F8FC;border-radius:10px\">\n                  <sc-for list=\"{{ r.segs }}\" as=\"g\" hint-placeholder-count=\"2\">\n                    <div onclick=\"{{ g.open }}\" title=\"{{ g.title }}\" style=\"position:absolute;top:4px;bottom:4px;left:{{ g.left }};width:{{ g.width }};background:{{ g.bg }};border-left:3px solid {{ g.dot }};border-radius:7px;display:flex;align-items:center;padding:0 8px;overflow:hidden;cursor:pointer\">\n                      <span style=\"font-size:11px;font-weight:600;color:{{ g.fg }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ g.label }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px solid #F0F2F8\">\n          <sc-for list=\"{{ s
