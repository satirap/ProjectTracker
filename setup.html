<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Tracker - Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-bottom: 30px; color: #333; }
    .info-box {
      background: #f0f7ff;
      border-left: 4px solid #0066cc;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 6px;
      font-size: 14px;
      color: #0066cc;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #5568d3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      background: #d1e7dd;
      color: #0f5132;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #842029;
      display: block;
    }
    .status.loading {
      background: #cfe2ff;
      color: #084298;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 Project Tracker Setup</h1>

    <div class="info-box">
      ⚠️ <strong>Setup Tool:</strong> ใช้เพื่อ initialize Firestore ด้วย default password
    </div>

    <div class="form-group">
      <label for="password">Set Admin Password:</label>
      <input
        type="text"
        id="password"
        value="test"
        placeholder="e.g., test">
    </div>

    <button onclick="setupFirebase()">Initialize Firestore</button>

    <div id="status" class="status"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDtin7zWgo2f8-4dhxA8eSZlgvG7YxbpqQ",
      authDomain: "project-def0c.firebaseapp.com",
      projectId: "project-def0c",
      storageBucket: "project-def0c.firebasestorage.app",
      messagingSenderId: "1027925892252",
      appId: "1:1027925892252:web:0bb57698c8fe21e45ee159",
      measurementId: "G-EE327ZKW0R"
    };

    let db = null;

    async function initFirebase() {
      return new Promise((resolve, reject) => {
        let attempts = 0;
        const checkInterval = setInterval(() => {
          attempts++;
          console.log('Checking Firebase... attempt', attempts);
          if (typeof firebase !== 'undefined' && firebase.initializeApp) {
            clearInterval(checkInterval);
            try {
              firebase.initializeApp(firebaseConfig);
              db = firebase.firestore();
              console.log('Firebase initialized successfully');
              resolve();
            } catch (error) {
              console.error('Firebase init error:', error);
              reject(error);
            }
          }
        }, 200);

        setTimeout(() => {
          clearInterval(checkInterval);
          reject(new Error(`Firebase failed to load after ${attempts} attempts`));
        }, 10000);
      });
    }

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function setupFirebase() {
      const password = document.getElementById('password').value;
      const statusEl = document.getElementById('status');

      if (!password) {
        showStatus('กรุณาใส่ password', 'error');
        return;
      }

      try {
        showStatus('⏳ กำลัง initialize...', 'loading');

        if (!db) {
          await initFirebase();
        }

        const hash = await hashPassword(password);

        // Delete old admin config if exists
        await db.collection('admin').doc('config').delete();

        // Create new admin config
        await db.collection('admin').doc('config').set({
          passwordHash: hash,
          createdAt: new Date(),
          password: `(hash: ${password})`
        });

        showStatus(`✅ สำเร็จ! Password ตั้งเป็น: "${password}"\n\nตอนนี้สามารถเข้า Admin Panel ได้แล้ว`, 'success');
      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
        console.error('Setup error:', error);
      }
    }

    function showStatus(message, type) {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }
  </script>
</body>
</html>
